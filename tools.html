
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Arsenal • CyberShield Club</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background:#0a0a0a; color:#00ff41; font-family:'VT323',monospace; margin:0; padding:20px; }
        .terminal { max-width:1100px; margin:30px auto; background:#111; border:3px solid #00ff41; padding:30px; }
        h1 { text-align:center; font-size:2rem; }
        .tool-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(500px,1fr)); gap:25px; }
        .tool-card {
            background:rgba(0,255,65,0.05); border:2px solid #00ff41; padding:25px;
            transition:0.3s; clip-path:polygon(8px 0%,100% 0%,calc(100%-8px)100%,0 100%);
        }
        .tool-card:hover { transform:translateY(-10px); box-shadow:0 0 30px rgba(0,255,65,0.5); }
        input, button { font-family:'VT323',monospace; font-size:1.4rem; padding:12px; margin:10px 0; background:#000; color:#00ff41; border:2px solid #00ff41; width:100%; }
        button { cursor:pointer; }
        button:hover { background:#00ff41; color:#000; }
        .output { margin-top:20px; background:#000; padding:15px; border:1px solid #00ff41; min-height:120px; white-space:pre-wrap; }
        .live { color:#ffff00; animation:blink 1s infinite; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>root@cybershield:\~$ arsenal --live-tools</h1>
        <p style="text-align:center;color:#ffff00;">Real-time • Ethical • Educational</p>

        <div class="tool-grid">

            <!-- Tool 1: IP Geolocation -->
            <div class="tool-card">
                <h2>🌐 Your IP &amp; Geolocation (Live)</h2>
                <button onclick="getIPInfo()">SHOW MY IP &amp; LOCATION</button>
                <div id="ip-output" class="output"></div>
            </div>

            <!-- Tool 2: DNS Lookup -->
            <div class="tool-card">
                <h2>🔍 DNS Lookup (Real-time)</h2>
                <input type="text" id="domain" placeholder="example.com" value="google.com">
                <button onclick="dnsLookup()">QUERY DNS RECORDS</button>
                <div id="dns-output" class="output"></div>
            </div>

            <!-- Tool 3: Password Auditor -->
            <div class="tool-card">
                <h2>🔑 Password Strength Auditor</h2>
                <input type="text" id="password" placeholder="Enter password to test" onkeyup="checkPassword()">
                <div id="password-output" class="output"></div>
            </div>

            <!-- Tool 4: GitHub Live Stats -->
            <div class="tool-card">
                <h2>📊 Live GitHub Repo Stats</h2>
                <button onclick="getRepoStats()">REFRESH LIVE STATS</button>
                <div id="repo-output" class="output"></div>
            </div>

        </div>

        <p style="text-align:center;margin-top:40px;">
            <a href="dashboard.html" style="color:#00ff41;">← Back to Dashboard</a>
        </p>
    </div>

    <script>
        // Tool 1: Real IP Geolocation (ip-api.com - free, no key)
        async function getIPInfo() {
            const output = document.getElementById('ip-output');
            output.innerHTML = '🔄 Fetching live data...';
            try {
                const res = await fetch('https://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,isp,org,proxy,hosting,query');
                const data = await res.json();
                if (data.status === 'success') {
                    output.innerHTML = `
                        <span class="live">● LIVE</span><br>
                        IP: ${data.query}<br>
                        Location: ${data.city}, ${data.regionName}, ${data.country}<br>
                        ISP: ${data.isp}<br>
                        Organization: ${data.org || 'N/A'}<br>
                        Proxy/VPN: ${data.proxy ? 'YES ⚠️' : 'No'}<br>
                        Hosting: ${data.hosting ? 'YES' : 'No'}
                    `;
                } else {
                    output.textContent = 'Error: ' + data.message;
                }
            } catch(e) {
                output.textContent = 'Network error – try again';
            }
        }

        // Tool 2: Real DNS Lookup (Google DNS DoH - free, no key)
        async function dnsLookup() {
            const domain = document.getElementById('domain').value.trim() || 'google.com';
            const output = document.getElementById('dns-output');
            output.innerHTML = '🔄 Querying DNS...';
            try {
                const res = await fetch(`https://dns.google/resolve?name=${domain}&type=ALL`);
                const data = await res.json();
                let html = `<span class="live">● LIVE</span><br>Domain: ${domain}<br><br>`;
                if (data.Answer) {
                    data.Answer.forEach(record => {
                        html += `${record.type} → ${record.data}<br>`;
                    });
                } else {
                    html += 'No records found or query failed';
                }
                output.innerHTML = html;
            } catch(e) {
                output.textContent = 'Error fetching DNS';
            }
        }

        // Tool 3: Password Strength (real-time)
        function checkPassword() {
            const pass = document.getElementById('password').value;
            const output = document.getElementById('password-output');
            if (!pass) {
                output.innerHTML = 'Type a password to analyze...';
                return;
            }
            let strength = 0;
            let feedback = '';
            if (pass.length >= 8) strength++;
            if (/[A-Z]/.test(pass)) strength++;
            if (/[0-9]/.test(pass)) strength++;
            if (/[^A-Za-z0-9]/.test(pass)) strength++;

            if (strength >= 4) feedback = '✅ VERY STRONG';
            else if (strength >= 3) feedback = '🟡 GOOD';
            else if (strength >= 2) feedback = '🟠 MEDIUM';
            else feedback = '🔴 WEAK';

            output.innerHTML = `
                Strength: <strong>${feedback}</strong><br>
                Length: ${pass.length}<br>
                Tips: ${pass.length < 12 ? 'Add more characters • Use symbols' : 'Looks solid!'}
            `;
        }

        // Tool 4: Live GitHub Repo Stats
        async function getRepoStats() {
            const output = document.getElementById('repo-output');
            output.innerHTML = '🔄 Fetching live repo data...';
            try {
                const res = await fetch('https://api.github.com/repos/pavankumarderangula290-source/cybersecurity-club');
                const repo = await res.json();
                output.innerHTML = `
                    <span class="live">● LIVE</span><br>
                    Stars: ⭐ ${repo.stargazers_count}<br>
                    Forks: 🍴 ${repo.forks_count}<br>
                    Open Issues: 🐛 ${repo.open_issues_count}<br>
                    Last Updated: ${new Date(repo.updated_at).toLocaleDateString('en-IN')}
                `;
            } catch(e) {
                output.textContent = 'Repo data temporarily unavailable';
            }
        }

        // Auto-refresh repo stats every 30 seconds
        setInterval(() => {
            if (document.getElementById('repo-output')) getRepoStats();
        }, 30000);
    </script>
</body>
</html>
