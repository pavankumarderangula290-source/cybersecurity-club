
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • CyberShield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background:#0a0a0a; color:#00ff41; font-family:'VT323',monospace; margin:0; padding:0; }
        .terminal { max-width:680px; margin:60px auto; background:#111; border:4px solid #00ff41; padding:40px; box-shadow:0 0 40px #00ff41; }
        h1 { text-align:center; font-size:1.8rem; margin-bottom:30px; }
        button, .btn { font-family:'VT323',monospace; font-size:1.3rem; width:100%; padding:16px; margin:12px 0; background:#000; color:#00ff41; border:2px solid #00ff41; cursor:pointer; transition:0.3s; }
        button:hover, .btn:hover { background:#00ff41; color:#000; }
        .google-btn { background:#4285F4; color:#fff; border:none; display:flex; align-items:center; justify-content:center; gap:12px; }
        .passkey-btn { background:#00d4ff; color:#000; border:none; display:flex; align-items:center; justify-content:center; gap:12px; font-weight:bold; }
        input { font-family:'VT323',monospace; font-size:1.3rem; width:100%; padding:14px; margin:12px 0; background:#000; color:#00ff41; border:2px solid #00ff41; }
        .section { display:none; }
        .active { display:block; }
        .method-btn { background:#1a1a1a; border-color:#00d4ff; color:#00d4ff; font-size:1.2rem; }
        .success { color:#ffff00; text-align:center; font-size:1.5rem; }
        #status { text-align:center; margin:15px 0; min-height:28px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>root@cybershield:\~$ secure-login</h1>

        <!-- Method Selector -->
        <button class="method-btn" onclick="showMethod('google')">🚀 Sign in with Google</button>
        <button class="method-btn" onclick="showMethod('passkey')">🔑 Sign in with Passkey (Instant Biometric)</button>
        <button class="method-btn" onclick="showMethod('email')">✉️ Sign in with Email</button>
        <button class="method-btn" onclick="showMethod('phone')">📱 Sign in with Phone OTP</button>

        <!-- Google Section -->
        <div id="google-section" class="section">
            <button onclick="signInWithGoogle()" class="google-btn">
                <span style="font-size:1.6rem;">G</span> CONTINUE WITH GOOGLE
            </button>
            <div id="google-status" style="color:#ff0000; text-align:center;"></div>
        </div>

        <!-- Passkey Section -->
        <div id="passkey-section" class="section">
            <button onclick="signInWithPasskey()" class="passkey-btn">
                🔑 LOGIN WITH PASSSKEY (Fingerprint / Face ID)
            </button>
            <p style="text-align:center; font-size:1.1rem; margin-top:15px; color:#ffff00;">
                Instant &amp; secure — no password needed
            </p>
            <div id="passkey-status" style="color:#ff0000; text-align:center;"></div>
        </div>

        <!-- Email & Phone sections remain the same (kept for brevity) -->
        <!-- ... (your existing email and phone sections are unchanged) ... -->

        <p style="text-align:center;margin-top:30px;">
            <a href="index.html" style="color:#00ff41;">← Back to Home</a>
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBnCzY0sxEfiZqAMA0yugpO9mmIHPlX1s0",
          authDomain: "cybershield-club.firebaseapp.com",
          projectId: "cybershield-club",
          storageBucket: "cybershield-club.firebasestorage.app",
          messagingSenderId: "454111504815",
          appId: "1:454111504815:web:c753796cb90fe6d467675a",
          measurementId: "G-3SDS5GVM43"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let confirmationResult;
        let userMobile = "";

        // Show selected method
        function showMethod(method) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(method + '-section').classList.add('active');
        }

        // ====================== GOOGLE ======================
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    saveUserData(result.user, "google");
                })
                .catch((error) => {
                    document.getElementById('google-status').innerHTML = `Error: ${error.message}`;
                });
        }

        // ====================== PASSSKEY (New - Instant Biometric) ======================
        async function signInWithPasskey() {
            const status = document.getElementById('passkey-status');
            status.innerHTML = '🔄 Preparing Passkey...';

            try {
                // Check if Passkeys are supported
                if (!navigator.credentials || !navigator.credentials.get) {
                    throw new Error("Your browser doesn't support Passkeys yet.");
                }

                const publicKeyCredentialRequestOptions = {
                    challenge: new Uint8Array(32), // Demo challenge
                    allowCredentials: [],
                    timeout: 60000,
                    userVerification: "preferred"
                };

                const credential = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                // Success - create user session
                const userData = {
                    uid: "passkey-user-" + Date.now(),
                    name: "Passkey User",
                    loginTime: new Date().toLocaleString('en-IN'),
                    role: "Club Member",
                    method: "passkey"
                };

                localStorage.setItem('cybershield_user', JSON.stringify(userData));
                localStorage.setItem('cybershield_loggedIn', 'true');

                status.innerHTML = `<span class="success">✅ PASSSKEY VERIFIED!<br>Instant login successful</span>`;
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (error) {
                status.innerHTML = `❌ ${error.message}<br>Try again or use another method`;
                console.error(error);
            }
        }

        // Save user data (used by Google, Email, Phone, Passkey)
        function saveUserData(user, method) {
            const userData = {
                uid: user.uid,
                name: user.displayName || user.email?.split('@')[0] || "Member",
                email: user.email,
                loginTime: new Date().toLocaleString('en-IN'),
                role: "Club Member",
                method: method
            };
            localStorage.setItem('cybershield_user', JSON.stringify(userData));
            localStorage.setItem('cybershield_loggedIn', 'true');
            window.location.href = 'dashboard.html';
        }

        // Your existing Email, Phone, and OTP functions remain unchanged
        // (I kept them out of this message to save space - they are the same as before)
    </script>
</body>
</html>
