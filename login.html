
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • CyberShield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background:#0a0a0a; color:#00ff41; font-family:'VT323',monospace; margin:0; padding:0; }
        .terminal { max-width:680px; margin:60px auto; background:#111; border:4px solid #00ff41; padding:40px; box-shadow:0 0 40px #00ff41; }
        h1 { text-align:center; font-size:1.8rem; margin-bottom:30px; }
        button, .btn { font-family:'VT323',monospace; font-size:1.3rem; width:100%; padding:16px; margin:12px 0; background:#000; color:#00ff41; border:2px solid #00ff41; cursor:pointer; transition:0.3s; }
        button:hover, .btn:hover { background:#00ff41; color:#000; }
        input { font-family:'VT323',monospace; font-size:1.3rem; width:100%; padding:14px; margin:12px 0; background:#000; color:#00ff41; border:2px solid #00ff41; }
        .section { display:none; }
        .active { display:block; }
        .method-btn { background:#1a1a1a; border-color:#00d4ff; color:#00d4ff; font-size:1.2rem; }
        .success { color:#ffff00; text-align:center; font-size:1.5rem; }
        #status, #status2, #email-status { text-align:center; margin:15px 0; min-height:28px; }
        .google-btn { background:#4285F4; color:#fff; border:none; display:flex; align-items:center; justify-content:center; gap:12px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>root@cybershield:\~$ secure-login</h1>

        <!-- Method Selector -->
        <button class="method-btn" onclick="showMethod('google')">🚀 Sign in with Google</button>
        <button class="method-btn" onclick="showMethod('email')">✉️ Sign in with Email</button>
        <button class="method-btn" onclick="showMethod('phone')">📱 Sign in with Phone OTP</button>

        <!-- Google Section -->
        <div id="google-section" class="section">
            <button onclick="signInWithGoogle()" class="google-btn">
                <span style="font-size:1.6rem;">G</span> CONTINUE WITH GOOGLE
            </button>
            <div id="google-status" style="color:#ff0000; text-align:center;"></div>
        </div>

        <!-- Email Section -->
        <div id="email-section" class="section">
            <div style="text-align:center; margin:10px 0;">
                <button onclick="toggleEmailMode()" id="email-mode-btn" style="background:none; border:none; color:#00d4ff; font-size:1.1rem;">LOGIN</button>
                <span style="color:#555;"> | </span>
                <button onclick="toggleEmailMode()" id="email-mode-btn2" style="background:none; border:none; color:#555; font-size:1.1rem;">REGISTER</button>
            </div>

            <input type="email" id="email" placeholder="your@email.com" required>
            <input type="password" id="password" placeholder="Password" required>

            <button onclick="handleEmailAuth()">LOGIN</button>
            <div id="email-status"></div>
        </div>

        <!-- Phone Section -->
        <div id="phone-section" class="section active">
            <label>📱 Mobile Number (with country code)</label>
            <input type="tel" id="mobile" placeholder="+91 8317635568" value="+91 8317635568" required>
            <div id="recaptcha-container" style="margin:20px 0; text-align:center;"></div>
            <button onclick="sendOTP()">SEND REAL SMS OTP</button>
            <div id="status"></div>

            <div id="otp-step" style="display:none;">
                <label>🔢 Enter 6-digit OTP</label>
                <input type="text" id="otp" maxlength="6" placeholder="123456">
                <button onclick="verifyOTP()">VERIFY OTP</button>
                <div id="status2" style="color:#ff0000;"></div>
            </div>
        </div>

        <p style="text-align:center;margin-top:30px;">
            <a href="index.html" style="color:#00ff41;">← Back to Home</a>
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBnCzY0sxEfiZqAMA0yugpO9mmIHPlX1s0",
          authDomain: "cybershield-club.firebaseapp.com",
          projectId: "cybershield-club",
          storageBucket: "cybershield-club.firebasestorage.app",
          messagingSenderId: "454111504815",
          appId: "1:454111504815:web:c753796cb90fe6d467675a",
          measurementId: "G-3SDS5GVM43"
        };

        let confirmationResult;
        let userMobile = "";
        let emailMode = "login"; // login or register

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Show selected method
        function showMethod(method) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(method + '-section').classList.add('active');
        }

        // ====================== GOOGLE ======================
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    const userData = {
                        uid: user.uid,
                        name: user.displayName || "Google User",
                        email: user.email,
                        loginTime: new Date().toLocaleString('en-IN'),
                        role: "Club Member",
                        method: "google"
                    };
                    localStorage.setItem('cybershield_user', JSON.stringify(userData));
                    localStorage.setItem('cybershield_loggedIn', 'true');
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    document.getElementById('google-status').innerHTML = `Error: ${error.message}`;
                });
        }

        // ====================== EMAIL ======================
        function toggleEmailMode() {
            emailMode = emailMode === "login" ? "register" : "login";
            const btn1 = document.getElementById('email-mode-btn');
            const btn2 = document.getElementById('email-mode-btn2');
            if (emailMode === "login") {
                btn1.style.color = "#00d4ff"; btn1.style.fontWeight = "bold";
                btn2.style.color = "#555"; btn2.style.fontWeight = "normal";
                document.querySelector('button[onclick="handleEmailAuth()"]').textContent = "LOGIN";
            } else {
                btn1.style.color = "#555"; btn1.style.fontWeight = "normal";
                btn2.style.color = "#00d4ff"; btn2.style.fontWeight = "bold";
                document.querySelector('button[onclick="handleEmailAuth()"]').textContent = "REGISTER";
            }
        }

        function handleEmailAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) return;

            const status = document.getElementById('email-status');

            if (emailMode === "login") {
                auth.signInWithEmailAndPassword(email, password)
                    .then((result) => {
                        saveUserData(result.user, "email");
                    })
                    .catch(err => status.innerHTML = `Error: ${err.message}`);
            } else {
                auth.createUserWithEmailAndPassword(email, password)
                    .then((result) => {
                        saveUserData(result.user, "email");
                    })
                    .catch(err => status.innerHTML = `Error: ${err.message}`);
            }
        }

        function saveUserData(user, method) {
            const userData = {
                uid: user.uid,
                name: user.displayName || user.email.split('@')[0],
                email: user.email,
                loginTime: new Date().toLocaleString('en-IN'),
                role: "Club Member",
                method: method
            };
            localStorage.setItem('cybershield_user', JSON.stringify(userData));
            localStorage.setItem('cybershield_loggedIn', 'true');
            window.location.href = 'dashboard.html';
        }

        // ====================== PHONE OTP ======================
        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal',
                'callback': function(response) {}
            });
        };

        function sendOTP() {
            const mobileInput = document.getElementById('mobile').value.trim();
            if (!mobileInput.startsWith('+')) {
                document.getElementById('status').innerHTML = `Use international format (+91 ...)`;
                return;
            }

            userMobile = mobileInput;
            document.getElementById('status').innerHTML = `Sending OTP to <strong>${userMobile}</strong>...`;

            const appVerifier = window.recaptchaVerifier;
            auth.signInWithPhoneNumber(userMobile, appVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('status').innerHTML = `✅ OTP SENT!`;
                    document.getElementById('otp-step').style.display = 'block';
                })
                .catch((error) => {
                    document.getElementById('status').innerHTML = `Error: ${error.message}`;
                });
        }

        function verifyOTP() {
            const code = document.getElementById('otp').value.trim();
            if (!code || code.length !== 6) return;

            confirmationResult.confirm(code)
                .then((result) => {
                    const userData = {
                        uid: result.user.uid,
                        mobile: userMobile,
                        name: "Pavan Kumar",
                        role: "Club President",
                        loginTime: new Date().toLocaleString('en-IN'),
                        method: "phone"
                    };
                    localStorage.setItem('cybershield_user', JSON.stringify(userData));
                    localStorage.setItem('cybershield_loggedIn', 'true');
                    document.getElementById('status2').innerHTML = `<span class="success">✅ VERIFIED!<br>Redirecting...</span>`;
                    setTimeout(() => window.location.href = 'dashboard.html', 1200);
                })
                .catch(() => {
                    document.getElementById('status2').innerHTML = `Invalid OTP. Try again.`;
                });
        }
    </script>
</body>
</html>
