
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • CyberShield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background:#0a0a0a; color:#00ff41; font-family:'VT323',monospace; margin:0; padding:0; }
        .terminal { max-width:680px; margin:60px auto; background:#111; border:4px solid #00ff41; padding:40px; box-shadow:0 0 40px #00ff41; }
        h1 { text-align:center; font-size:1.8rem; margin-bottom:30px; }
        button { 
            font-family:'VT323',monospace; 
            font-size:1.4rem; 
            width:100%; 
            padding:18px; 
            margin:12px 0; 
            background:#000; 
            color:#00ff41; 
            border:2px solid #00ff41; 
            cursor:pointer; 
            transition:0.3s; 
        }
        button:hover { background:#00ff41; color:#000; }
        .biometric-btn { 
            background:#00d4ff; 
            color:#000; 
            font-weight:bold; 
            font-size:1.5rem; 
        }
        .success { color:#ffff00; text-align:center; font-size:1.5rem; }
        #status { text-align:center; margin:15px 0; min-height:28px; color:#ff0000; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>root@cybershield:\~$ secure-login</h1>

        <button onclick="signInWithGoogle()">🚀 Sign in with Google</button>
        <button onclick="handleBiometric()" class="biometric-btn">👤 LOGIN WITH FINGERPRINT / FACE ID</button>
        <button onclick="window.location.href='login.html'">✉️ Sign in with Email</button>
        <button onclick="window.location.href='login.html'">📱 Sign in with Phone OTP</button>

        <div id="status"></div>

        <p style="text-align:center;margin-top:30px;">
            <a href="index.html" style="color:#00ff41;">← Back to Home</a>
        </p>
    </div>

    <!-- Firebase SDK (for Google) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBnCzY0sxEfiZqAMA0yugpO9mmIHPlX1s0",
          authDomain: "cybershield-club.firebaseapp.com",
          projectId: "cybershield-club",
          storageBucket: "cybershield-club.firebasestorage.app",
          messagingSenderId: "454111504815",
          appId: "1:454111504815:web:c753796cb90fe6d467675a",
          measurementId: "G-3SDS5GVM43"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Real Biometric (Fingerprint / Face ID) with WebAuthn
        async function handleBiometric() {
            const status = document.getElementById('status');
            status.innerHTML = '🔄 Preparing biometric verification...';

            try {
                // First try authentication (login)
                const authOptions = {
                    publicKey: {
                        challenge: crypto.getRandomValues(new Uint8Array(32)),
                        rpId: window.location.hostname,
                        userVerification: "preferred",
                        timeout: 60000
                    }
                };

                const assertion = await navigator.credentials.get(authOptions);

                // Biometric success - store data
                const userData = {
                    uid: "biometric-" + Date.now(),
                    name: "Pavan Kumar",
                    role: "Club President",
                    loginTime: new Date().toLocaleString('en-IN'),
                    method: "fingerprint_faceid"
                };

                localStorage.setItem('cybershield_user', JSON.stringify(userData));
                localStorage.setItem('cybershield_loggedIn', 'true');

                status.innerHTML = `<span class="success">✅ FINGERPRINT / FACE ID VERIFIED!<br>Welcome back, Operator 👾</span>`;

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (authError) {
                // No credential found → Register new Passkey
                status.innerHTML = 'No Passkey found. Registering new biometric...';

                try {
                    const regOptions = {
                        publicKey: {
                            challenge: crypto.getRandomValues(new Uint8Array(32)),
                            rp: { 
                                name: "CyberShield Club", 
                                id: window.location.hostname 
                            },
                            user: {
                                id: crypto.getRandomValues(new Uint8Array(16)),
                                name: "pavan@cybershield.club",
                                displayName: "Pavan Kumar"
                            },
                            pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                            timeout: 60000,
                            attestation: "none"
                        }
                    };

                    const credential = await navigator.credentials.create(regOptions);

                    // Registration success - store data
                    const userData = {
                        uid: "biometric-" + Date.now(),
                        name: "Pavan Kumar",
                        role: "Club President",
                        loginTime: new Date().toLocaleString('en-IN'),
                        method: "fingerprint_faceid"
                    };

                    localStorage.setItem('cybershield_user', JSON.stringify(userData));
                    localStorage.setItem('cybershield_loggedIn', 'true');

                    status.innerHTML = `<span class="success">✅ BIOMETRIC REGISTERED!<br>Fingerprint / Face ID is now active for instant login</span>`;

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);

                } catch (regError) {
                    status.innerHTML = `❌ Biometric not available or cancelled.<br>${regError.message}<br><br>Use Google or other method.`;
                }
            }
        }

        // Google login (kept for completeness)
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    const userData = {
                        uid: result.user.uid,
                        name: result.user.displayName || "Google User",
                        email: result.user.email,
                        loginTime: new Date().toLocaleString('en-IN'),
                        role: "Club Member",
                        method: "google"
                    };
                    localStorage.setItem('cybershield_user', JSON.stringify(userData));
                    localStorage.setItem('cybershield_loggedIn', 'true');
                    window.location.href = 'dashboard.html';
                })
                .catch(err => document.getElementById('status').innerHTML = `Google Error: ${err.message}`);
        }
    </script>
</body>
</html>
