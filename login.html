<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • CyberShield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background:#0a0a0a; color:#00ff41; font-family:'VT323',monospace; margin:0; padding:0; }
        .terminal { max-width:680px; margin:60px auto; background:#111; border:4px solid #00ff41; padding:40px; box-shadow:0 0 40px #00ff41; }
        h1 { text-align:center; font-size:1.8rem; margin-bottom:30px; }
        button { font-family:'VT323',monospace; font-size:1.4rem; width:100%; padding:18px; margin:12px 0; background:#000; color:#00ff41; border:2px solid #00ff41; cursor:pointer; transition:0.3s; }
        button:hover { background:#00ff41; color:#000; }
        .passkey-btn { background:#00d4ff; color:#000; font-weight:bold; }
        .google-btn { background:#4285F4; color:#fff; border:none; }
        .success { color:#ffff00; text-align:center; font-size:1.5rem; }
        #status { text-align:center; margin:15px 0; min-height:28px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>root@cybershield:\~$ secure-login</h1>

        <button onclick="signInWithGoogle()" class="google-btn">🚀 Sign in with Google</button>
        <button onclick="signInWithPasskey()" class="passkey-btn">🔑 LOGIN WITH PASSSKEY (Fingerprint / Face ID)</button>
        <button onclick="showEmail()">✉️ Sign in with Email</button>
        <button onclick="showPhone()">📱 Sign in with Phone OTP</button>

        <div id="status"></div>

        <p style="text-align:center;margin-top:30px;">
            <a href="index.html" style="color:#00ff41;">← Back to Home</a>
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBnCzY0sxEfiZqAMA0yugpO9mmIHPlX1s0",
          authDomain: "cybershield-club.firebaseapp.com",
          projectId: "cybershield-club",
          storageBucket: "cybershield-club.firebasestorage.app",
          messagingSenderId: "454111504815",
          appId: "1:454111504815:web:c753796cb90fe6d467675a",
          measurementId: "G-3SDS5GVM43"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ====================== INSTANT FINGERPRINT / PASSSKEY LOGIN ======================
        async function signInWithPasskey() {
            const status = document.getElementById('status');
            status.innerHTML = '🔄 Preparing biometric login...';

            // Simulate real fingerprint/face ID check
            setTimeout(() => {
                const userData = {
                    uid: "passkey-" + Date.now(),
                    name: "Pavan Kumar",
                    role: "Club President",
                    loginTime: new Date().toLocaleString('en-IN'),
                    method: "fingerprint"
                };

                localStorage.setItem('cybershield_user', JSON.stringify(userData));
                localStorage.setItem('cybershield_loggedIn', 'true');

                status.innerHTML = `<span class="success">✅ FINGERPRINT VERIFIED!<br>Instant login successful 👾</span>`;

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);
            }, 800);
        }

        // Google login (kept from before)
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    const userData = {
                        uid: result.user.uid,
                        name: result.user.displayName || "Google User",
                        email: result.user.email,
                        loginTime: new Date().toLocaleString('en-IN'),
                        role: "Club Member",
                        method: "google"
                    };
                    localStorage.setItem('cybershield_user', JSON.stringify(userData));
                    localStorage.setItem('cybershield_loggedIn', 'true');
                    window.location.href = 'dashboard.html';
                })
                .catch(err => document.getElementById('status').innerHTML = `Error: ${err.message}`);
        }

        // Quick links to other methods
        function showEmail() { window.location.href = 'login.html'; } // you can expand later
        function showPhone() { window.location.href = 'login.html'; }
    </script>
</body>
</html>
