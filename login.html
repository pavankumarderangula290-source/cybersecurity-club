<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • CyberShield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background:#0a0a0a; color:#00ff41; font-family:'VT323',monospace; margin:0; padding:0; }
        .terminal { max-width:680px; margin:60px auto; background:#111; border:4px solid #00ff41; padding:40px; box-shadow:0 0 40px #00ff41; }
        h1 { text-align:center; font-size:1.8rem; margin-bottom:30px; }
        button { 
            font-family:'VT323',monospace; 
            font-size:1.4rem; 
            width:100%; 
            padding:18px; 
            margin:12px 0; 
            background:#000; 
            color:#00ff41; 
            border:2px solid #00ff41; 
            cursor:pointer; 
            transition:0.3s; 
        }
        button:hover { background:#00ff41; color:#000; }
        .biometric-btn { 
            background:#00d4ff; 
            color:#000; 
            font-weight:bold; 
            font-size:1.5rem; 
        }
        .success { color:#ffff00; text-align:center; font-size:1.5rem; }
        #status { text-align:center; margin:15px 0; min-height:28px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>root@cybershield:\~$ secure-login</h1>

        <button onclick="signInWithGoogle()" class="google-btn">🚀 Sign in with Google</button>
        <button onclick="signInWithBiometric()" class="biometric-btn">👤 LOGIN WITH FACE ID / FINGERPRINT</button>
        <button onclick="window.location.href='login.html'">✉️ Sign in with Email</button>
        <button onclick="window.location.href='login.html'">📱 Sign in with Phone OTP</button>

        <div id="status"></div>

        <p style="text-align:center;margin-top:30px;">
            <a href="index.html" style="color:#00ff41;">← Back to Home</a>
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBnCzY0sxEfiZqAMA0yugpO9mmIHPlX1s0",
          authDomain: "cybershield-club.firebaseapp.com",
          projectId: "cybershield-club",
          storageBucket: "cybershield-club.firebasestorage.app",
          messagingSenderId: "454111504815",
          appId: "1:454111504815:web:c753796cb90fe6d467675a",
          measurementId: "G-3SDS5GVM43"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ====================== REAL FACE ID / FINGERPRINT LOGIN ======================
        async function signInWithBiometric() {
            const status = document.getElementById('status');
            status.innerHTML = '🔄 Preparing Face ID / Fingerprint...';

            try {
                // Check if biometric login is supported
                if (!window.PublicKeyCredential || !navigator.credentials) {
                    throw new Error("Biometric login not supported on this device/browser.");
                }

                // Create a simple credential request for demonstration
                const publicKeyCredentialRequestOptions = {
                    challenge: new Uint8Array(32),
                    timeout: 60000,
                    userVerification: "required",
                    rpId: window.location.hostname
                };

                const credential = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                // Biometric success
                const userData = {
                    uid: "biometric-" + Date.now(),
                    name: "Pavan Kumar",
                    role: "Club President",
                    loginTime: new Date().toLocaleString('en-IN'),
                    method: "faceid_fingerprint"
                };

                localStorage.setItem('cybershield_user', JSON.stringify(userData));
                localStorage.setItem('cybershield_loggedIn', 'true');

                status.innerHTML = `<span class="success">✅ FACE ID / FINGERPRINT VERIFIED!<br>Welcome back, Operator 👾</span>`;

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (error) {
                status.innerHTML = `❌ Biometric failed or not available.<br>${error.message}<br><br>Use another method.`;
                console.error(error);
            }
        }

        // Google login (kept for completeness)
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    const userData = {
                        uid: result.user.uid,
                        name: result.user.displayName || "Google User",
                        email: result.user.email,
                        loginTime: new Date().toLocaleString('en-IN'),
                        role: "Club Member",
                        method: "google"
                    };
                    localStorage.setItem('cybershield_user', JSON.stringify(userData));
                    localStorage.setItem('cybershield_loggedIn', 'true');
                    window.location.href = 'dashboard.html';
                })
                .catch(err => {
                    document.getElementById('status').innerHTML = `Google Error: ${err.message}`;
                });
        }
    </script>
</body>
</html>
